<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>BioStat Chico - Auditoria de Dados</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 BioStat: Estatística Descritiva de Mídia</h1>
            <p>Trabalho Acadêmico - Coleta de Dados via APIs</p>
        </header>

        <section class="card controls">
            <select id="fonteTop">
                <option value="anime">Animes (Jikan)</option>
                <option value="tmdb">Filmes (TMDB)</option>
            </select>
            <select id="agruparPor">
                <option value="nota">Variável: Notas</option>
                <option value="ano" selected>Variável: Anos</option>
            </select>
            <button onclick="buscarTop50()" class="btn-purple">⚡ Extrair e Analisar</button>
        </section>

        <main class="grid">
            <div class="card">
                <h3>📋 Tabela de Classes (fi/fa)</h3>
                <table id="tabela-classes">
                    <thead><tr><th>Classe</th><th>fi</th><th>fa</th><th>xi</th></tr></thead>
                    <tbody id="tabela-body"></tbody>
                </table>
            </div>

            <div class="right-column">
                <div class="card">
                    <h3>📈 Medidas de Resumo</h3>
                    <div id="medidas-stats" class="stats-grid">
                        </div>
                </div>

                <div class="card">
                    <h3>🔍 Lista de Auditoria</h3>
                    <div class="table-scroll">
                        <table id="tabela-auditoria">
                            <thead><tr><th>Título</th><th>Nota</th><th>Ano</th></tr></thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>

                <div class="card full-width">
                    <h3>📉 Ogiva de Galton (Acumulada)</h3>
                    <div style="height: 300px;">
                        <canvas id="ogivaChart"></canvas>
                    </div>
                </div>

            </div>

            <div class="card full-width">
                <h3>📊 Histograma da Distribuição</h3>
                <canvas id="histChart"></canvas>
            </div>
        </main>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
